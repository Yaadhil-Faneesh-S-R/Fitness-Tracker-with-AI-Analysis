name: fitness_tracker
description: A Fitness Tracker System - Software Engineering Project.
  Tracks user profiles, workouts, BMI calculations, and daily calorie summaries.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  csv: ^6.0.0
  intl: ^0.19.0
  path_provider: 2.1.2
  path_provider_windows: 2.2.1
  path_provider_foundation: 2.3.2
  fl_chart: ^0.70.1
  google_generative_ai: ^0.4.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
